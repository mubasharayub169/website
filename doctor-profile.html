    <script src="doctors-data.js"></script>
    <script>
        (function renderDoctorProfile() {
            const profileContainer = document.getElementById('doctorProfileContainer');
            const doctorSlug = new URLSearchParams(window.location.search).get('slug');
            const doctorsData = Array.isArray(window.doctorsData) ? window.doctorsData : [];
            const doctor = doctorsData.find((item) => item.slug === doctorSlug);
            const isFemaleDoctor = doctor && doctor.gender === 'female';
            const isWhiteBackgroundProfile = doctor && doctor.slug === 'umar-draz-tariq';
            const isAsadProfile = doctor && doctor.slug === 'asad-ali-sandhu';

            if (!profileContainer) return;

            if (!doctor) {
                profileContainer.innerHTML = `
                    <div class="consultant-profile-empty">
                        <p class="consultant-profile-kicker">Consultant profile</p>
                        <h1 style="margin-bottom: 12px;">Doctor Profile Not Found</h1>
                        <p style="color: var(--gray-color); margin-bottom: 20px;">Requested profile is unavailable. Please check the doctors list and choose another consultant.</p>
                        <a href="doctors.html" class="btn btn-primary">Back to Doctors</a>
                    </div>
                `;
                return;
            }

            document.title = `${doctor.name} - Ikram Hospital`;

            const profileDescription = `${doctor.name} - ${doctor.specialty || 'Consultant'} at Ikram Hospital. ${doctor.bio || 'View consultant profile, OPD hours, specialties, and appointment options.'}`;

            const setMetaTag = (selector, content) => {
                const metaTag = document.querySelector(selector);
                if (metaTag && content) {
                    metaTag.setAttribute('content', content);
                }
            };

            setMetaTag('meta[name="description"]', profileDescription);
            setMetaTag('meta[property="og:title"]', `${doctor.name} - Ikram Hospital`);
            setMetaTag('meta[property="og:description"]', profileDescription);
            setMetaTag('meta[property="og:url"]', `${window.location.origin}${window.location.pathname}${window.location.search}`);
            setMetaTag('meta[name="twitter:title"]', `${doctor.name} - Ikram Hospital`);
            setMetaTag('meta[name="twitter:description"]', profileDescription);

            const highlights = (doctor.highlights || []).map((item) => `
                <li><i class="fas fa-check-circle"></i> ${item}</li>
            `).join('');

            const specialties = (doctor.specialties || []).map((item) => `
                <li><i class="fas fa-check-circle"></i> ${item}</li>
            `).join('');
            const timing = doctor.timing || 'Mon-Sat • 9:00 AM - 6:00 PM';
            const showTiming = !doctor.hideTiming;
            const experience = doctor.experience || 'Consultant';
            const educationSummary = doctor.education || 'Clinical education and specialist training details available on request.';
            const heroSpecialty = doctor.specialty || 'Consultant Physician';

            profileContainer.innerHTML = `
                <div class="consultant-profile-hero">
                    <div class="consultant-profile-grid">
                        <div class="consultant-profile-copy">
                            <p class="consultant-profile-kicker">Consultant profile</p>
                            <div class="doctor-profile-heading-row">
                                <h1>${doctor.name}</h1>
                                ${doctor.badge ? `<span class="doctor-role-badge doctor-role-badge-profile" aria-label="${doctor.badge} badge">${doctor.badge}</span>` : ''}
                            </div>
                            <p class="consultant-profile-summary">${doctor.bio || ''}</p>
                            <div class="consultant-profile-actions">
                                <a href="appointment-booking.html?doctor=${encodeURIComponent(doctor.name)}" class="btn btn-primary"><i class="fas fa-calendar-check" aria-hidden="true"></i><span>Book Appointment</span></a>
                                <a href="doctors.html" class="btn btn-secondary"><i class="fas fa-arrow-left" aria-hidden="true"></i><span>Back to Doctors</span></a>
                            </div>
                            ${showTiming ? `<div class="consultant-profile-timing-strip" aria-label="OPD timing">
                                <i class="fas fa-clock consultant-profile-timing-icon" aria-hidden="true"></i>
                                <span class="consultant-profile-timing-label">OPD Timing</span>
                                <span class="consultant-profile-timing-value">${timing}</span>
                            </div>` : ''}
                        </div>
                        <div class="consultant-profile-visual">
                            <div class="about-image consultant-profile-photo-wrap">
                                ${doctor.profileImage || doctor.image
                                    ? `<img class="doctor-profile-photo${isWhiteBackgroundProfile ? ' doctor-profile-photo-white-bg' : ''}${isAsadProfile ? ' doctor-profile-photo-asad' : ''}" src="${doctor.profileImage || doctor.image}" alt="${doctor.name}">`
                                    : `<div class="doctor-profile-photo-placeholder ${isFemaleDoctor ? 'doctor-profile-photo-placeholder-female' : ''}" aria-label="${doctor.name} photo coming soon">
                                            <i class="fas ${isFemaleDoctor ? 'fa-user-nurse' : 'fa-user-md'}"></i>
                                            <span>${isFemaleDoctor ? 'Female Doctor' : 'Doctor Profile'}</span>
                                            <small>Photo Coming Soon</small>
                                       </div>`}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="consultant-profile-overview">
                    <div class="consultant-profile-section">
                        <h3>Specialization</h3>
                        <p>${heroSpecialty}</p>
                    </div>
                    <div class="consultant-profile-section">
                        <h3>Education</h3>
                        <p>${educationSummary}</p>
                    </div>
                    <div class="consultant-profile-section consultant-profile-section-wide">
                        <h3>Services Provided</h3>
                        <ul class="about-highlights consultant-profile-list">${specialties}</ul>
                    </div>
                </div>
            `;
        })();
    </script>
